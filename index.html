<head>
<meta charset="utf-8" />

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>

<style>
:root{
  --accent:#df4b10;
  --blue:#2d9cdb;
  --danger:#e74c3c;
  --card:#ffffff;
  --muted:#666;
}
body { font-family: Arial, sans-serif; margin:0; background:#f7f7f7; color:#222; }
header {
  background: linear-gradient(90deg, #f38a01, #00d170);
  color: white; padding:8px 14px; box-shadow:0 3px 8px rgba(0,0,0,0.08);
  position: sticky; top:0; z-index:1000; display:flex; gap:12px; align-items:center; justify-content:space-between;
}
#searchContainer{ display:flex; gap:10px; align-items:center; width:100%; max-width:1200px; margin:0 auto; }
#searchInput{ flex:1; max-width:360px; padding:6px 8px; border-radius:6px; border:1px solid rgba(0,0,0,0.12); }
#adminLink{ background:rgba(0,0,0,0.2); color:#fff; padding:6px 10px; border-radius:6px; text-decoration:none; font-weight:600; }
#btnOpenCart{ background:rgba(255,255,255,0.12); color:#fff; padding:6px 10px; border-radius:6px; border:0; cursor:pointer; font-weight:700; }
.page { padding:18px; max-width:1200px; margin:0 auto; }
.layout-coluna{ display:flex; flex-direction:column; gap:14px; align-items:center; }
.card{ background:var(--card); border-radius:10px; padding:14px; width:95%; max-width:1000px; box-shadow:0 6px 18px rgba(0,0,0,0.04); position:relative; }
.products{ display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
.product{ width:180px; background:#fafafa; border:1px solid #eee; border-radius:8px; padding:8px; text-align:center; display:flex; flex-direction:column; gap:8px; }
/* Ajuste de largura dos cards no celular */
@media (max-width: 600px) {
  .product {
    width: 90%;          /* ocupa quase toda a tela do celular */
    margin: 10px auto;   /* centraliza horizontalmente */
    display: block;      /* cada card em linha separada */
  }

  .product img {
    width: 100%;         /* imagem ocupa toda a largura do card */
    height: auto;        /* mantém proporção */
  }

  .product .controls input,
  .product .controls select,
  .product .controls button {
    width: 100%;         /* campos e botão ocupam largura total */
    margin-top: 6px;
  }
}

.product img{ width:70%; height:100px; object-fit:cover; border-radius:6px; }
.product .meta{ flex:1; font-size:13px; color:var(--muted); }
.product .price{ font-weight:700; font-size:14px; }
.product .controls{ display:flex; gap:6px; align-items:center; justify-content:center; flex-direction:column; }
.product select, .product input[type="number"]{ width:100%; padding:6px; border-radius:6px; border:1px solid #ddd; box-sizing:border-box; }
.btn{ border:0; padding:8px 10px; border-radius:8px; cursor:pointer; font-weight:600; }
.btn-add{ background:var(--accent); color:#fff; width:100%; }
.cart-items{ display:flex; flex-direction:column; gap:10px; margin-top:8px; max-height:48vh; overflow:auto; padding-right:6px; }
.cart-item{ display:flex; gap:10px; align-items:center; background:#f8f8f8; padding:8px; border-radius:8px; }
.cart-item img{ width:64px; height:64px; object-fit:cover; border-radius:6px; }
.cart-item .info{ flex:1; font-size:14px; }
.cart-item .info small{ display:block; color:var(--muted); font-size:12px; }
.remove-btn{ background:var(--danger); color:rgb(255, 255, 255); border:0; padding:6px 8px; border-radius:6px; cursor:pointer; }
.cart-actions{ display:flex; gap:10px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
.total{ text-align:right; font-weight:700; font-size:18px; margin-top:8px; }
.pix-area{ text-align:center; margin-top:12px; }
.small{ color:var(--muted); font-size:13px; }
.pix-copy-actions{ display:flex; gap:8px; margin-top:8px; justify-content:center; }

.client-form { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.client-form input, .client-form textarea { padding:8px; border-radius:6px; border:1px solid #ddd; width:100%; box-sizing:border-box; }
.client-form .col { flex:1; min-width:200px; }

.catalog-block {
  position:absolute;
  inset:0;
  background: rgba(255, 255, 255, 0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  border-radius:10px;
  flex-direction:column;
  gap:8px;
  text-align:center;
  z-index:50;
}
.catalog-block .msg { font-weight:700; color:var(--danger); }

/* modal */
.modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.35); display:flex; align-items:flex-start; justify-content:center; padding:40px 12px; z-index:2000; }
.modal{ background:#fff; border-radius:10px; width:100%; max-width:900px; padding:18px; box-shadow:0 10px 40px rgba(0,0,0,0.25); max-height:85vh; overflow:auto; }
.admin-row{ display:flex; align-items:center; gap:12px; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f0f0f0; }
.admin-row .meta{ flex:1; }
.admin-controls{ display:flex; gap:8px; }

@media (max-width:900px){
  .product{ width:48%; }
  header{ padding:10px; flex-direction:column; align-items:stretch; gap:8px; }
  #searchContainer{ max-width:100%; }
}

.btn-add.flash {
  animation: flashAnim 0.4s ease-out;
}

@keyframes flashAnim {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.15); background:#4caf50; color:#fff; }
  100% { transform: scale(1); }
}

/* Aumentar largura dos cards no celular */
@media (max-width: 600px) {
  .product {
    width: 95% !important;
  }

  .product img {
    height: 160px; /* opcional: imagem maior */
  }
}
/*  botão carrinho css */
#btnOpenCart {
  display: flex;
  align-items: center;
  gap: 6px;
}

#btnOpenCart .icon-cart {
  width: 20px;
  height: 20px;
}

/* CSS do badge (bolinha com número)*/
#btnOpenCart {
  position: relative;
}

#cartCount {
  background: red;
  color: white;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 50%;
  position: absolute;
  top: -5px;
  right: -5px;
}

/* Preço antigo riscado no centro*/
.old-price {
  text-decoration: line-through;
  color: #888;        /* cor mais apagada */
  font-size: 13px;    /* menor */
  margin-left: 6px;   /* um espacinho do preço atual */
}
.product {
  display: flex;
  flex-direction: column;
  background: #fff;
  border-radius: 10px;
  padding: 10px;
  gap: 10px;
}

.product-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.info-area {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 5px 3px;
}

.price-box {
  display: flex;
  align-items: center;
  gap: 6px;
}

.current-price strong {
  font-size: 20px;
  color: #0eaf51;
}

.old-price {

  color: #888;
  text-decoration: line-through;
}

.percent {
  background: #d32f2f;
  color: #fff;
  padding: 2px 6px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: bold;
}

.name {
  font-size: 16px;
  font-weight: 600;
}

.desc {
  font-size: 13px;

}

/* carrinho desativado*/
.disabled {
  background:#999 !important;
  cursor:not-allowed !important;
  opacity:0.7;
}
.btn-add.disabled {
  background: #bbb !important;
  cursor: not-allowed !important;
}

/* CSS para botões PIX */
.btn-disabled {

}

/* ========================= */
/* CORREÇÕES PARA PAINEL ADMIN NO CELULAR */
/* ========================= */

  }

    min-width: 70px !important;
    padding: 8px !important;

  }
  
  /* Barra de ferramentas do admin */
  .modal div[style*="display: flex; flex-wrap: wrap; gap: 8px;"] {
    flex-direction: column !important;
  }
  
  .modal div[style*="display: flex; flex-wrap: wrap; gap: 8px;"] button {
    width: 100% !important;
    min-width: unset !important;
    margin-bottom: 5px !important;
  }
  
  /* Cabeçalho do modal admin */
  .modal div[style*="display: flex; justify-content: space-between;"] {
    flex-direction: column !important;

    align-items: flex-start !important;
  }
  
  /* Botão fechar do admin */

    width: 100% !important;

  }
  
  /* Barra de pesquisa do admin */
  .modal input[placeholder*="Pesquisar produto"] {

  }
  
  /* Modal backdrop */

}

/* Ajustes adicionais para telas muito pequenas */
@media (max-width: 400px) {
  .admin-controls {
    flex-direction: column !important;
  }
  
  .admin-controls button {
    width: 100% !important;
  }
  
  .modal {
    padding: 8px !important;
  }
  
  /* Botões do toolbar */
  .modal button {
    font-size: 13px !important;
    padding: 10px 8px !important;
  }
}

/* Melhorar scroll no mobile */
#adminProductsList {
  -webkit-overflow-scrolling: touch !important;
  overscroll-behavior: contain !important;
}

/* Ajustar modal de senha no mobile */
@media (max-width: 600px) {
  div[style*="background: white; padding: 25px; border-radius: 10px;"] {
    padding: 15px !important;
    width: 95% !important;
    margin: 10px !important;
  }
  
  div[style*="background: white; padding: 25px; border-radius: 10px;"] input {
    padding: 10px !important;
    font-size: 14px !important;
  }
  
  div[style*="background: white; padding: 25px; border-radius: 10px;"] button {
    padding: 10px !important;
    font-size: 13px !important;
  }
}

/* ========================= */
/* ESTILOS PARA LOADING (OTIMIZAÇÕES) */
/* ========================= */

/* Loading animation */
.loading-indicator {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid #f3f3f3;
  border-top: 2px solid #3498db;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-right: 8px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Skeleton loading */
.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
}

@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Skeleton loading para produtos */
.product-skeleton {
  width: 180px;
  background: #f5f5f5;
  border-radius: 8px;
  padding: 8px;
  margin: 5px;
}

.product-skeleton .img-skeleton {
  width: 100%;
  height: 120px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
  border-radius: 6px;
}

@media (max-width: 600px) {
  .product-skeleton {
    width: 90%;
    margin: 10px auto;
  }
}
</style>

<body>
<header style="padding: 5px; text-align: center;">

  <!-- LOGO + NOME -->
  <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
    
    <!-- LOGO -->
    <img src="imagens/compras_verduras.png" 
         alt="Logo" 
         style="width: 48px; height: auto; border-radius: 8px;">
    
    <!-- NOME DA EMPRESA -->
    <h1 style="margin: 0; font-size: 18px; font-weight: bold;">
      Hortifruti Cliente 2
    </h1>
  </div>

  <!-- CAMPO DE PESQUISA -->
  <div id="searchContainer" style="margin-top: 12px;">
    <input id="searchInput" placeholder="🔍 Pesquisar produtos..." />
    <a href="#" id="adminLink">Admin</a>
    <button id="btnOpenCart">
    <img 
      src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" 
      alt="Carrinho" 
      class="icon-cart"
    >
   <!--Carrinho-->
    <span id="cartCount">0</span>

<main class="page">
<div class="layout-coluna">

  <!-- Produtos / catálogo -->
  <div class="card" id="catalogCard">
    <h2 style="text-align:center;margin:0 0 8px 0;">Produtos</h2>

      <div class="col" style="flex-basis:100%"><textarea id="clientAddress" rows="2" placeholder="Endereço"></textarea></div>
      <div class="col" style="flex-basis:100%; display:flex; gap:8px; align-items:center;">
        <input id="clientLocation" placeholder="Localização (link do Maps)" style="flex:1;">

      <button class="btn" style="background:#25d366;color:#fff" onclick="enviarWhats()">📲 Enviar pelo WhatsApp</button>
      <button class="btn" style="background:var(--blue);color:#fff" onclick="continuarComprando()">➡️ Continuar comprando</button>
    </div>

    <!-- PIX opção 2 -->
    <div class="pix-area" id="pixArea">
      <h3 style="margin:12px 0 6px 0;">Pagamento PIX</h3>
      <div class="small">Chave PIX: <b id="pixKeyDisplay">--</b></div>
      <div style="margin-top:8px;">
        <textarea id="pixPayload" readonly rows="3" style="width:100%; margin-top:6px; padding:6px; border-radius:6px; border:1px solid #ddd;"></textarea>
        <button class="btn" id="btnCopyPayload" style="margin-top:6px; background:var(--blue); color:#fff;">📋 Copiar código PIX</button>
      </div>

<script>
// =========================
// FIREBASE (compat) CONFIG
// =========================
const firebaseConfig = {
  apiKey: "AIzaSyBYkn_DB7yzt_KhMd49RxfIVgIleNZjhdQ",
  authDomain: "hortifruti-cliente-2.firebaseapp.com",
  projectId: "hortifruti-cliente-2",
  storageBucket: "hortifruti-cliente-2.firebasestorage.app",
  messagingSenderId: "955241592474",
  appId: "1:955241592474:web:83d8c2668c90306cead123"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// =========================
// MELHORIAS PARA MOBILE - PAINEL ADMIN
// =========================

// Função para melhorar a experiência mobile no painel admin
function melhorarMobileAdmin() {
  // Ajustar altura do container de produtos
  const adminContainer = document.getElementById('adminProductsList');
  if (adminContainer && window.innerWidth <= 600) {
    adminContainer.style.maxHeight = 'calc(80vh - 250px)';
  }
  
  // Ajustar botões para touch
  document.querySelectorAll('.admin-controls button').forEach(btn => {
    btn.style.minHeight = '44px'; // Tamanho mínimo para toque
    btn.style.touchAction = 'manipulation';
  });
}

// =========================
// OTIMIZAÇÕES DE DESEMPENHO - CARREGAMENTO MAIS RÁPIDO
// =========================

// Cache para produtos (evita múltiplas requisições desnecessárias)
let produtosCache = null;
let ultimoCarregamentoCache = null;
const CACHE_TIMEOUT = 30000; // 30 segundos

// =========================
// FUNÇÃO GLOBAL PARA FORÇAR ATUALIZAÇÃO DO CATÁLOGO
// =========================
window.forcarAtualizacaoCatalogo = function() {
  console.log('🔄 Forçando atualização do catálogo...');
  
  // Invalidar cache
  produtosCache = null;
  ultimoCarregamentoCache = null;
  
  // Recarregar produtos
  if (typeof carregarProdutos === 'function') {
    carregarProdutos();
  }
  
  // Se estiver no modo admin, recarregar também
  if (document.querySelector('.modal-backdrop')) {
    if (typeof renderAdminProductsContent === 'function') {
      renderAdminProductsContent();
    }
  }
  
  return '✅ Catálogo atualizado!';
};

// Função otimizada para carregar produtos
async function carregarProdutosOtimizado() {
  console.log('🔄 Carregando produtos (versão otimizada)...');
  
  // Mostrar loading imediato
  const container = document.getElementById('productsList');
  if (container) {
    container.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">Carregando produtos...</div>';
  }
  
  // Verificar cache válido
  const agora = Date.now();
  if (produtosCache && ultimoCarregamentoCache && 
      (agora - ultimoCarregamentoCache) < CACHE_TIMEOUT) {
    console.log('✅ Usando cache de produtos');
    renderizarProdutosDoCache();
    return;
  }
  
  try {
    // Fazer login automático se não estiver autenticado (não bloquear)
    if (!auth.currentUser) {
      auth.signInAnonymously().catch(() => {
        console.log('⚠️ Autenticação em segundo plano');
      });
    }
    
    // Verificar estoque pausado e vendas liberadas em paralelo
    const [estoqueSnap, cfgSnap] = await Promise.all([
      db.collection('config').doc('estoque').get(),
      db.collection('config').doc('controle').get()
    ]);
    
    const estoquePausado = estoqueSnap.exists ? estoqueSnap.data().pausado : false;
    const vendasLiberadas = cfgSnap.exists ? cfgSnap.data().vendasLiberadas : true;
    
    if (estoquePausado) {
      container.innerHTML = `
        <div class="catalog-block" style="display:flex;">
          <h2>⏸️ Estoque em Manutenção</h2>
          <p>Estamos atualizando nosso estoque. Volte em breve!</p>
        </div>
      `;
      return;
    }
    
    if (!vendasLiberadas) {
      container.innerHTML = `
        <div class="catalog-block">
          <h2>⚠️ Vendas temporariamente indisponíveis</h2>
          <p>Retornaremos em breve!</p>
        </div>
      `;
      return;
    }
    
    // Carregar produtos com limite e cache
    console.time('🔥 Carregamento produtos');
    const snap = await db.collection('produtos')
      .where('active', '==', true)
      .limit(50) // Limite para performance
      .get();
    
    console.timeEnd('🔥 Carregamento produtos');
    
    // Atualizar cache
    produtosCache = [];
    snap.forEach(doc => {
      const p = doc.data();
      p._id = doc.id;
      produtosCache.push(p);
    });
    ultimoCarregamentoCache = Date.now();
    
    console.log(`✅ ${produtosCache.length} produtos carregados no cache`);
    
    // Renderizar produtos
    renderizarProdutosDoCache();
    
  } catch (error) {
    console.error('❌ Erro ao carregar produtos:', error);
    if (container) {
      container.innerHTML = `
        <div class="catalog-block">
          <h2>⚠️ Erro ao carregar produtos</h2>
          <p>Tente recarregar a página</p>
          <button onclick="carregarProdutosOtimizado()" style="margin-top:10px; padding:8px 16px; background:#3498db; color:white; border:none; border-radius:5px;">
            Tentar novamente
          </button>
        </div>
      `;
    }
  }
}

// Função para renderizar produtos do cache (mais rápida)
function renderizarProdutosDoCache() {
  console.log('🎨 Renderizando produtos do cache...');
  
  if (!produtosCache || produtosCache.length === 0) {
    const container = document.getElementById('productsList');
    container.innerHTML = '<div class="small">Nenhum produto disponível no momento.</div>';
    return;
  }
  
  const container = document.getElementById('productsList');
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  
  // Limpar container
  container.innerHTML = '';
  
  let produtosFiltrados = 0;
  
  produtosCache.forEach(p => {
    if (!p.name.toLowerCase().includes(searchTerm)) return;
    produtosFiltrados++;
    
    const priceUnit = p.priceUnit != null ? Number(p.priceUnit) : null;
    const priceKg = p.priceKg != null ? Number(p.priceKg) : null;
    const precoTexto = priceUnit ?? priceKg ?? 0;
    
    // Encontrar quantidade no carrinho
    let cartQty = 0;
    const found = cart.find(item => item.id === p._id);
    if (found) cartQty = found.qty;
    
    const oldPrice = p.oldPrice ? Number(p.oldPrice) : null;
    const percent = oldPrice ? `-${((1 - (precoTexto / oldPrice)) * 100).toFixed(0)}%` : null;
    
    const card = document.createElement('div');
    card.className = 'product';
    card.setAttribute('data-id', p._id);
    
    // Template mantendo a estrutura original
    card.innerHTML = `
      <img src="${escapeHtml(p.img || 'https://via.placeholder.com/400x300?text=Sem+imagem')}" 
           class="product-img"
           loading="lazy">
      <div class="info-area">
        <div class="price-box">
          <div class="current-price">
            <strong>${formatBRL(precoTexto)}</strong>
          </div>
          ${oldPrice ? `<div class="old-price">${formatBRL(oldPrice)}</div>` : ""}
          ${percent ? `<div class="percent">${percent}</div>` : ""}
        </div>
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="desc">${escapeHtml(p.desc || '')}</div>
      </div>
      <div class="controls">
        <select id="mode_${p._id}">
          ${priceUnit ? '<option value="unit">Unidade</option>' : ''}
          ${priceKg ? '<option value="kg">Kg</option>' : ''}
        </select>
        <input id="qty_${p._id}" type="number" value="1" min="0.1" step="0.1">
        ${
          cartEnabled
          ? `<button class="btn btn-add" id="add_${p._id}">+ Carrinho</button>`
          : `<button class="btn btn-disabled" disabled>⏸️ Carrinho Desativado</button>`
        }
        ${cartQty > 0 ? `<button class="btn btn-remove" id="rem_${p._id}">🗑️</button>` : ""}
      </div>
      <div class="cart-status">
        ${cartQty > 0 ? `Já no carrinho: <strong>${cartQty}</strong>` : ""}
      </div>
    `;
    
    container.appendChild(card);
    
    // ADICIONAR EVENT LISTENERS COMO NA FUNÇÃO ORIGINAL
    const sel = document.getElementById(`mode_${p._id}`);
    const addBtn = document.getElementById(`add_${p._id}`);
    const qtyInput = document.getElementById(`qty_${p._id}`);
    const remBtn = document.getElementById(`rem_${p._id}`);
    
    if (!sel || sel.options.length === 0) {
      if (addBtn) {
        addBtn.disabled = true;
        addBtn.textContent = 'Sem preço';
        addBtn.style.opacity = 0.6;
      }
    }
    
    if (addBtn && cartEnabled) {
      // Adicionar event listener para adicionar ao carrinho
      addBtn.addEventListener('click', async function() {
        if (addBtn.disabled) return;
        
        const selectedMode = sel ? sel.value : (priceUnit != null ? 'unit' : 'kg');
        const qty = Number(qtyInput ? qtyInput.value : 1) || 1;
        const unitPrice = (selectedMode === 'kg') ? priceKg : priceUnit;
        
        if (unitPrice == null) {
          alert('Preço inválido.');
          return;
        }
        
        try {
          const snapData = (await db.collection('produtos').doc(p._id).get()).data();
          const stock = snapData.stock ?? 0;
          
          if (qty > stock) {
            alert(`Só temos ${stock} unidades disponíveis.`);
            return;
          }
          
          addToCart({
            id: p._id,
            name: p.name || 'Produto',
            img: p.img,
            mode: selectedMode,
            qty,
            unitPrice: Number(unitPrice)
          });
          
          saveCart();
          
          // Efeito visual de confirmação
          addBtn.classList.add('flash');
          setTimeout(() => addBtn.classList.remove('flash'), 400);
          
          // Atualizar apenas este card
          atualizarCardDoProduto(p._id);
          
        } catch (error) {
          alert('Erro ao verificar estoque: ' + error.message);
        }
      });
    }
    
    if (remBtn) {
      // Adicionar event listener para remover do carrinho
      remBtn.addEventListener('click', function() {
        const item = cart.find(c => c.id === p._id);
        if (!item) return;
        
        const qtdRemover = prompt(`Você tem ${item.qty} no carrinho.\nQuantos deseja remover?`);
        if (!qtdRemover) return;
        
        const n = Number(qtdRemover);
        if (isNaN(n) || n <= 0) {
          alert("Quantidade inválida.");
          return;
        }
        
        if (n >= item.qty) {
          cart = cart.filter(c => c.id !== p._id);
        } else {
          item.qty -= n;
        }
        
        saveCart();
        renderizarProdutosDoCache(); // Recarregar produtos para atualizar todos
        renderCart(); // Atualizar carrinho visível
      });
    }
  });
  
  // Feedback visual
  if (produtosFiltrados === 0 && searchTerm) {
    container.innerHTML = `<div style="text-align:center; padding:20px; color:#666;">Nenhum produto encontrado para "${searchTerm}"</div>`;
  }
  
  console.log(`✅ ${produtosFiltrados} produtos renderizados`);
}

        const n = Number(qtdRemover);
        if (isNaN(n) || n <= 0) {
          alert("Quantidade inválida.");
          return;
        }
        
        if (n >= item.qty) {
          cart = cart.filter(c => c.id !== productId);
        } else {

const sistemaLogs = {
    async registrar(tipo, dados) {
        try {
            const logEntry = {
                tipo,
                dados: this._sanitizarDados(dados),
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                url: window.location.href
            };
            
            // Salvar no Firebase
            await db.collection('logs_seguranca').add(logEntry);
            
            // Console apenas em desenvolvimento
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                console.log(`[LOG] ${tipo}:`, logEntry);
            }
            
        } catch (error) {
            console.error('Erro ao salvar log:', error);
        }
    },
    
    _sanitizarDados(dados) {
        // Remove dados sensíveis
        const sanitizado = { ...dados };
        
        // Mascarar senhas
        if (sanitizado.senha) sanitizado.senha = '***MASKED***';
        if (sanitizado.password) sanitizado.password = '***MASKED***';
        
        // Mascarar chaves PIX/CPF
        if (sanitizado.chave) {
            sanitizado.chave = '***' + sanitizado.chave.toString().slice(-4);
        }
        
        if (sanitizado.cpf) {
            sanitizado.cpf = '***.***.***-**';
        }
        
        return sanitizado;
    }
};

async function hashSenha(senha) {
    // Hash simples mas mais seguro que texto claro
    const encoder = new TextEncoder();
    const data = encoder.encode(senha + 'HORTI_SALT_SECRET'); // Sal adicionado
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    return hashHex;
}

}

// FUNÇÃO CRC16 CORRIGIDA
function calcularCRC16(str) {
  let crc = 0xFFFF;
  
  for (let i = 0; i < str.length; i++) {
    crc ^= str.charCodeAt(i) << 8;
    
    for (let j = 0; j < 8; j++) {
      if (crc & 0x8000) {
        crc = (crc << 1) ^ 0x1021;
      } else {
        crc = crc << 1;
      }
      
      crc &= 0xFFFF;
    }
  }
  
  return crc.toString(16).toUpperCase().padStart(4, '0');
}

// FUNÇÃO PIX CORRIGIDA
function buildPixEMV(chavePix, nomeRecebedor, cidadeRecebedor, valor) {
  chavePix = String(chavePix || '').trim();
  nomeRecebedor = String(nomeRecebedor || '').toUpperCase().substring(0, 25);
  cidadeRecebedor = String(cidadeRecebedor || '').toUpperCase().substring(0, 15);
  
  // Validação: se nome ou cidade estiverem vazios, usar valores genéricos
  if (!nomeRecebedor || nomeRecebedor.trim() === '') {
    nomeRecebedor = 'LOJA';
  }
  
  if (!cidadeRecebedor || cidadeRecebedor.trim() === '') {
    cidadeRecebedor = 'CIDADE';
  }
  
  let valorStr = '';
  if (valor && Number(valor) > 0) {
    valorStr = Number(valor).toFixed(2);
  }
  
  const criarCampo = (id, valor) => {
    const strValor = String(valor);
    return id.toString().padStart(2, '0') + 
           strValor.length.toString().padStart(2, '0') + 
           strValor;
  };
  
  let payload = '';
  payload += criarCampo(0, '01');
  
  const gui = 'BR.GOV.BCB.PIX';
  const guiField = criarCampo(0, gui);
  const chaveField = criarCampo(1, chavePix);
  const mai = guiField + chaveField;
  payload += '26' + mai.length.toString().padStart(2, '0') + mai;
  
  payload += criarCampo(52, '0000');
  payload += criarCampo(53, '986');
  
  if (valorStr) {
    payload += criarCampo(54, valorStr);
  }
  
  payload += criarCampo(58, 'BR');
  payload += criarCampo(59, nomeRecebedor);
  payload += criarCampo(60, cidadeRecebedor);
  
  const txid = 'HORTI' + Date.now().toString().slice(-10);
  const txidField = criarCampo(5, txid);
  const addData = txidField;
  payload += '62' + addData.length.toString().padStart(2, '0') + addData;
  
  const dadosCRC = payload + '6304';
  const crc = calcularCRC16(dadosCRC);
  
  return dadosCRC + crc;
}

        merchantName = ''; // Deixa vazio se não tiver configurado
      }
      
      // Se tiver cidade configurada, usa ela

        merchantCity = data.cidadeTitular.toUpperCase();
      } else {
        merchantCity = ''; // Deixa vazio se não tiver configurado
      }

        chave: rawPixPhone, 
        nome: merchantName, 
        cidade: merchantCity 
      });
      
      return data;

async function atualizarStatusCarrinhoUnificado() {
  try {
    const cartCfg = await db.collection("config").doc("cart").get();
    cartEnabled = cartCfg.exists ? cartCfg.data().enabled !== false : true;

    // Atualizar apenas os botões, NÃO esconder o catálogo
    const icon = document.getElementById("btnOpenCart");
    if (icon) {
      if (cartEnabled) {
        icon.style.display = "flex";
        icon.style.opacity = "1";
        icon.style.cursor = "pointer";
      } else {
        icon.style.display = "flex"; // Mantém visível
        icon.style.opacity = "0.5";
        icon.style.cursor = "not-allowed";
      }
    }
    
    // REMOVER ou COMENTAR esta parte que esconde o catálogo:
    const catalogBlocked = document.getElementById("catalogBlocked");
    if (catalogBlocked) catalogBlocked.style.display = "none"; // SEMPRE ESCONDIDO
    
    // Apenas esvaziar carrinho se estiver desativado
    if (!cartEnabled) {
      cart = [];
      localStorage.removeItem('cart');
      if (typeof renderCart === 'function') renderCart();
      if (typeof updateCartCount === 'function') updateCartCount();
    }
    
    // Recarregar produtos para atualizar botões
    if (typeof carregarProdutos === 'function') {
      carregarProdutos();
    }
    
  } catch (err) {
    console.error('Erro ao atualizar status do carrinho:', err);
  }
}

// FUNÇÕES DO CARRINHO
// =========================
async function addToCart(item) {
  if (!cartEnabled) {
    alert("O carrinho está desativado no momento.");
    return;
  }
  
  const snapData = (await db.collection('produtos').doc(item.id).get()).data();
  const stock = snapData.stock ?? 0;

  const idx = cart.findIndex(c => c.id === item.id && c.mode === item.mode);

  if (idx >= 0) {
    const novaQtd = cart[idx].qty + item.qty;

    if (novaQtd > stock) {
      alert(`Estoque insuficiente! Você já tem ${cart[idx].qty} no carrinho e só existem ${stock} unidades.`);
      return;
    }

    cart[idx].qty = novaQtd;
  } else {
    if (item.qty > stock) {
      alert(`Só temos ${stock} unidades disponíveis em estoque.`);
      return;
    }
    cart.push(item);
  }

  saveCart();
  renderCart();
  updateCartCount();
}

function updateCartCount() {
  try {
    const count = cart.reduce((total, item) => total + (item.qty || 0), 0);
    const badge = document.getElementById('cartCount');
    
    if (!badge) {
      console.warn('⚠️ Elemento cartCount não encontrado');
      return;
    }
    
    badge.textContent = count;
    
    if (count > 0) {
      badge.style.display = "inline-flex";
      badge.style.backgroundColor = "red";
      badge.style.color = "white";
    } else {
      badge.style.display = "none";
    }
    
    console.log('🛒 Contador atualizado:', count, 'itens');
  } catch (error) {
    console.error('❌ Erro ao atualizar contador do carrinho:', error);
  }
}

function renderCart() {
  const container = document.getElementById('cartItems');
  container.innerHTML = '';

  if (cart.length === 0) {
    container.innerHTML = '<div class="small">Nenhum item ainda.</div>';
  } else {
    cart.forEach(it => {
      const div = document.createElement('div');
      div.className = 'cart-item';

      div.innerHTML = `
        <img src="${escapeHtml(it.img)}" style="width:110px; height:80px; object-fit:cover;">
        <div class="info">
          <strong>${escapeHtml(it.name)}</strong>
          <small>${it.mode}</small>
          <small>Qtd: ${it.qty}</small>
          <small>Preço unit: ${formatBRL(it.unitPrice)}</small>
          <small>Total: ${formatBRL(it.unitPrice * it.qty)}</small>
        </div>
        <button class="remove-btn">Remover</button>
      `;

      div.querySelector('.remove-btn').addEventListener('click', () => {
        const qtd = prompt(`Você adicionou ${it.qty} unidades.\nQuantas deseja remover?`);
        if (!qtd) return;

        const n = Number(qtd);
        if (isNaN(n) || n <= 0) {
          alert("Quantidade inválida.");
          return;
        }

        if (n >= it.qty) {
          cart = cart.filter(c => c !== it);
        } else {
          it.qty -= n;
        }

        saveCart();
        renderCart();
      });

      container.appendChild(div);
    });
  }

  updateCartCount();
  document.getElementById('cartTotal').innerText = 'Total: ' + formatBRL(calcTotal());
  atualizarPixDisplay();
}

function limparCarrinho(){ 
  if(confirm('Deseja limpar o carrinho?')){ 
    cart=[]; 
    saveCart(); 
    renderCart(); 
  } 
}

// =========================
// FUNÇÃO ENVIAR WHATSAPP - CORRIGIDA PARA ABRIR APP NATIVO
// =========================
async function enviarWhats() {
  console.log('🟡 Iniciando envio para WhatsApp...');
  
  if (cart.length === 0) {
    alert('❌ Carrinho vazio! Adicione produtos antes de enviar.');
    return;
  }

  // 🛑 BLOQUEAR BOTÃO para evitar cliques duplos
  const btnWhats = document.querySelector('button[onclick="enviarWhats()"]');
  const originalText = btnWhats.textContent;
  btnWhats.textContent = '⏳ Preparando...';
  btnWhats.disabled = true;

  try {
    // ✅ 1º PASSO: VERIFICAR ESTOQUE
    const estoqueSnap = await db.collection('config').doc('estoque').get();
    const estoquePausado = estoqueSnap.exists ? estoqueSnap.data().pausado : false;
    
    if (estoquePausado) {
      alert('⏸️ Estoque em manutenção. Tente novamente mais tarde.');
      btnWhats.textContent = originalText;
      btnWhats.disabled = false;
      return;
    }

    for (const item of cart) {
      const produtoRef = db.collection('produtos').doc(item.id);
      const snap = await produtoRef.get();
      
      if (!snap.exists) {
        alert(`❌ Produto "${item.name}" não encontrado!`);
        btnWhats.textContent = originalText;
        btnWhats.disabled = false;
        return;
      }
      
      const produtoData = snap.data();
      const stockAtual = produtoData.stock || 0;
      
      if (item.qty > stockAtual) {
        alert(`❌ Estoque insuficiente:\n\n"${item.name}"\n• Pedido: ${item.qty}\n• Disponível: ${stockAtual}`);
        btnWhats.textContent = originalText;
        btnWhats.disabled = false;
        return;
      }
    }

    // ✅ 2º PASSO: RESERVAR ESTOQUE
    for (const item of cart) {
      const produtoRef = db.collection('produtos').doc(item.id);
      const snap = await produtoRef.get();
      const produtoData = snap.data();
      const stockAtual = produtoData.stock || 0;
      
      await produtoRef.update({
        stock: stockAtual - item.qty
      });
    }

    // ✅ 3º PASSO: BUSCAR NÚMERO DO WHATSAPP
    let numeroWhatsApp = '';
    
    try {
      const whatsSnap = await db.collection('config').doc('whatsapp').get();
      if (whatsSnap.exists && whatsSnap.data().numero) {
        numeroWhatsApp = whatsSnap.data().numero.replace(/\D/g, '');
        console.log('✅ Usando número do Firebase:', numeroWhatsApp);
      }
    } catch (error) {
      console.log('Número não configurado');
    }

    // Verificar se tem número configurado
    if (!numeroWhatsApp || numeroWhatsApp.trim() === '') {
      alert('❌ Número do WhatsApp não configurado!\n\nConfigure no painel admin primeiro.');
      btnWhats.textContent = originalText;
      btnWhats.disabled = false;
      return;
    }

    // ✅ 4º PASSO: MONTAR MENSAGEM SIMPLIFICADA
    const name = document.getElementById('clientName')?.value.trim() || 'Não informado';
    const phone = document.getElementById('clientPhone')?.value.trim() || 'Não informado';
    const address = document.getElementById('clientAddress')?.value.trim() || 'Não informado';
    const locationLink = document.getElementById('clientLocation')?.value.trim() || 'Não informado';

    let troco = document.getElementById('clientTroco')?.value.trim() || 'Não precisa de troco';

    let msg = '*🛒 NOVO PEDIDO - HORTIFRUTI* 🛒\n\n';
    msg += `*Cliente:* ${name}\n`;
    msg += `*Telefone:* ${phone}\n`;
    msg += `*Endereço:* ${address}\n`;
    msg += `*Troco:* ${troco}\n\n`;
    
    if (locationLink && locationLink !== 'Não informado') {
      msg += `*Localização:* ${locationLink}\n\n`;
    }
    
    msg += '*PRODUTOS:*\n';
    
    let totalPedido = 0;
    cart.forEach((item, index) => {
      const totalItem = item.unitPrice * item.qty;
      totalPedido += totalItem;
      
      msg += `${index + 1}. ${item.name}\n`;
      msg += `   Qtd: ${item.qty} (${item.mode})\n`;
      msg += `   R$ ${formatBRL(totalItem)}\n\n`;
    });
    
    msg += `*TOTAL: ${formatBRL(totalPedido)}*\n\n`;
    msg += `_💖Agradecemos pela sua preferência_\n`;
    msg += `_🛒seu pedigo já está sendo providenciado_\n`;
    msg += `*Chave PIX:* ${rawPixPhone || 'Não configurada'}\n`;
    msg += `*Data:* ${new Date().toLocaleDateString('pt-BR')}`;

    // ✅ 5º PASSO: CRIAR URL DO WHATSAPP
    const mensagemCodificada = encodeURIComponent(msg);
    
    // ✅ MÉTODO MULTICAMADA PARA CELULAR
    // Tentar diferentes URLs para evitar o banner do Chrome
    
    // Método 1: whatsapp:// (esquema nativo - funciona direto no app)
    const urlNative = `whatsapp://send?phone=${numeroWhatsApp}&text=${mensagemCodificada}`;
    
    // Método 2: api.whatsapp.com (URL oficial - mais confiável)
    const urlAPI = `https://api.whatsapp.com/send?phone=${numeroWhatsApp}&text=${mensagemCodificada}`;
    
    // Método 3: wa.me (alternativa)
    const urlWaMe = `https://wa.me/${numeroWhatsApp}?text=${mensagemCodificada}`;
    
    console.log('🔗 URLs WhatsApp geradas:', { urlNative, urlAPI, urlWaMe });
    console.log('📱 Número:', numeroWhatsApp);

    // ✅ 6º PASSO: LIMPAR CARRINHO
    cart = [];
    saveCart();
    renderCart();
    carregarProdutos();

    // ✅ 7º PASSO: ABRIR WHATSAPP - MÉTODO OTIMIZADO PARA CELULAR
    const confirmacao = confirm(
      `✅ PEDIDO PROCESSADO!\n\n` +
      `Será enviado para: ${numeroWhatsApp}\n` +
      `Total: ${formatBRL(totalPedido)}\n\n` +
      `Abrir WhatsApp agora?`
    );
    
    if (confirmacao) {
      console.log('🌐 Abrindo WhatsApp nativo...');
      
      // Função para mostrar instruções de fallback
      function mostrarInstrucoesFallback() {
        // Copiar mensagem completa para área de transferência
        const mensagemParaCopiar = msg; // Já temos a mensagem montada
        
        // Tentar copiar para área de transferência
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(mensagemParaCopiar)
            .then(() => {
              alert(
                '📱 INSTRUÇÕES PARA ENVIAR:\n\n' +
                '1. Abra o WhatsApp MANUALMENTE\n' +
                '2. Vá para: ' + numeroWhatsApp + '\n' +
                '3. COLE a mensagem (já foi copiada!)\n' +
                '4. Envie normalmente\n\n' +
                '✅ Mensagem copiada para área de transferência!'
              );
            })
            .catch(() => {
              alert(
                '📱 INSTRUÇÕES PARA ENVIAR:\n\n' +
                '1. Abra o WhatsApp MANUALMENTE\n' +
                '2. Vá para: ' + numeroWhatsApp + '\n' +
                '3. Copie a mensagem abaixo:\n\n' +
                mensagemParaCopiar.substring(0, 200) + '...\n\n' +
                '4. Cole e envie'
              );
            });
        } else {
          alert(
            '📱 INSTRUÇÕES PARA ENVIAR:\n\n' +
            '1. Abra o WhatsApp MANUALMENTE\n' +
            '2. Vá para: ' + numeroWhatsApp + '\n' +
            '3. Copie a mensagem abaixo:\n\n' +
            mensagemParaCopiar.substring(0, 200) + '...\n\n' +
            '4. Cole e envie'
          );
        }
      }
      
      // Detectar dispositivo
      const isAndroid = /android/i.test(navigator.userAgent);
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const isMobile = isAndroid || isIOS;
      
      // ESTRATÉGIA DE ABERTURA
      if (isMobile) {
        // Para celular: tentar múltiplos métodos
        let tentativaAtual = 0;
        const maxTentativas = 3;
        
        function tentarAbrirWhatsApp() {
          tentativaAtual++;
          
          if (tentativaAtual > maxTentativas) {
            // Todos os métodos falharam
            mostrarInstrucoesFallback();
            return;
          }
          
          let urlUsar = urlAPI; // Começa com API
          
          if (isAndroid && tentativaAtual === 1) {
            // Android: tenta esquema nativo primeiro
            urlUsar = urlNative;
          } else if (isIOS && tentativaAtual === 1) {
            // iOS: usa URL padrão
            urlUsar = urlAPI;
          } else if (tentativaAtual === 2) {
            // Segunda tentativa: tenta wa.me
            urlUsar = urlWaMe;
          } else if (tentativaAtual === 3) {
            // Terceira tentativa: tenta iframe
            urlUsar = urlAPI;
          }
          
          console.log(`Tentativa ${tentativaAtual}: ${urlUsar.substring(0, 60)}...`);
          
          // TÉCNICA: Usar iframe invisível
          try {
            const iframe = document.createElement('iframe');
            iframe.style.cssText = 'position:absolute;width:1px;height:1px;border:0;opacity:0;';
            iframe.src = urlUsar;
            document.body.appendChild(iframe);
            
            // Remove o iframe após 0.5 segundo
            setTimeout(() => {
              if (iframe && iframe.parentNode) {
                iframe.parentNode.removeChild(iframe);
              }
              
              // Se ainda não na última tentativa, tenta o próximo método
              if (tentativaAtual < maxTentativas) {
                setTimeout(() => {
                  tentarAbrirWhatsApp();
                }, 300);
              }
            }, 500);
            
          } catch (error) {
            console.log('Erro com iframe:', error);
            // Tenta próximo método
            if (tentativaAtual < maxTentativas) {
              setTimeout(() => {
                tentarAbrirWhatsApp();
              }, 300);
            }
          }
        }
        
        // Iniciar processo
        tentarAbrirWhatsApp();
        
        // Após 3 segundos, verificar e dar instruções
        setTimeout(() => {
          const abriuWhatsApp = confirm(
            '📱 WhatsApp foi aberto?\n\n' +
            'Se SIM, clique em "Cancelar" e envie a mensagem.\n\n' +
            'Se NÃO abriu, clique em "OK" para ver instruções.'
          );
          
          if (abriuWhatsApp) {
            // Usuário disse que NÃO abriu
            mostrarInstrucoesFallback();
          }
          // Se SIM abriu, não faz nada - o usuário já está no WhatsApp
        }, 3000);
        
      } else {
        // Para desktop: usar método simples
        try {
          window.open(urlAPI, '_blank', 'noopener,noreferrer');
        } catch (error) {
          console.log('Erro ao abrir WhatsApp Web:', error);
          window.location.href = urlAPI;
        }
      }
      
      // Feedback final (sempre aparece)
      setTimeout(() => {
        alert('✅ Pedido processado com sucesso!\n\n' +
              '• Carrinho limpo\n' +
              '• Estoque atualizado\n' +
              '• Pronto para enviar no WhatsApp\n\n' +
              'Agradecemos pelo pedido! 🛒');
      }, 1000);
      
    } else {
      alert('⚠️ Pedido processado mas não enviado.\nO carrinho foi limpo.');
    }

  } catch (error) {
    console.error('❌ Erro:', error);
    alert('❌ Erro ao processar pedido. Tente novamente.\n\nErro: ' + error.message);
  } finally {
    // Reativar botão
    setTimeout(() => {
      btnWhats.textContent = originalText;
      btnWhats.disabled = false;
    }, 2000);
  }
}

// =========================
// FUNÇÃO PARA VERIFICAR SENHA DO ADMINISTRADOR
// =========================
async function verificarSenhaAdmin(senhaHash) {
  try {
    const adminSnap = await db.collection('config').doc('admin').get();
    
    if (!adminSnap.exists) {
      // Se não existir configuração, solicitar ao usuário
      const novaSenha = prompt(
        '🔐 PRIMEIRO ACESSO - CONFIGURAR SENHA ADMIN\n\n' +
        'Este é o primeiro acesso ao sistema.\n' +
        'Digite uma senha para o administrador:'
      );
      
      if (!novaSenha || novaSenha.trim() === '') {
        alert('❌ Senha é obrigatória para primeiro acesso!');
        return false;
      }
      
      if (novaSenha.length < 4) {
        alert('❌ A senha deve ter pelo menos 4 caracteres!');
        return false;
      }
      
      const novaSenhaHash = await hashSenha(novaSenha);
      
      await db.collection('config').doc('admin').set({
        senha: novaSenhaHash,
        criadoEm: new Date().toISOString(),
        primeiroAcesso: true,
        criadoPor: 'sistema'
      });
      
      // Log da criação
      await sistemaLogs.registrar('admin_criado', {
        motivo: 'primeiro_acesso',
        ip: await getUserIP()
      });
      
      alert('✅ Senha admin configurada com sucesso!\n\nGuarde esta senha em local seguro.');
      return senhaHash === novaSenhaHash;
    }
    
    const dadosAdmin = adminSnap.data();
    return senhaHash === dadosAdmin.senha;
    
  } catch (error) {
    console.error('Erro ao verificar senha admin:', error);
    return false;
  }
}

async function verificarSenhaWhatsApp(senhaDigitada) {

      }
      
      if (novaSenhaWhatsApp.length < 4) {
        alert('❌ A senha do WhatsApp deve ter pelo menos 4 caracteres!');
        return false;
      }
      
      const novaSenhaHash = await hashSenha(novaSenhaWhatsApp);
      
      await db.collection('config').doc('whatsapp_senha').set({
        hash: novaSenhaHash,
        criadoEm: new Date().toISOString(),

      });
      
      alert('✅ Senha do WhatsApp configurada!\n\nGuarde esta senha em local seguro.');
      
      const senhaHashDigitada = await hashSenha(senhaDigitada);
      return senhaHashDigitada === novaSenhaHash;

function validarChavePIX(chave) {

        return {
            valido: false,
            chaveFormatada: '',

        };

    // Validações específicas por tipo
    switch (tipo) {
        case 'celular':
            // CORREÇÃO: Aceitar 86176915 e formatar para +5581986176915 (com o 9)
            // Remover todos não-numéricos
            const apenasNumerosCel = chave.replace(/\D/g, '');
            
            // Verificar se tem 8 ou 9 dígitos (sem DDD) ou 10-11 dígitos (com DDD)
            if (apenasNumerosCel.length >= 8 && apenasNumerosCel.length <= 11) {
                // CORREÇÃO: Se tiver 8 dígitos (sem o 9), adicionar 9
                if (apenasNumerosCel.length === 8) {
                    // Adicionar DDD 81 e o dígito 9
                    const numeroCompleto = '5581' + '9' + apenasNumerosCel;
                    const chaveFormatada = '+' + numeroCompleto;
                    
                    return {
                        valido: true,
                        chaveFormatada: chaveFormatada,
                        mensagem: `✅ Celular corrigido!\n\n` +
                                 `De: ${chave}\n` +
                                 `Para: ${chaveFormatada}`
                    };
                }
                
                // CORREÇÃO: Se tiver 9 dígitos (já tem o 9)
                if (apenasNumerosCel.length === 9) {
                    // Adicionar DDD 81
                    const numeroCompleto = '5581' + apenasNumerosCel;
                    const chaveFormatada = '+' + numeroCompleto;
                    
                    return {
                        valido: true,
                        chaveFormatada: chaveFormatada,
                        mensagem: `✅ Celular corrigido!\n\n` +
                                 `De: ${chave}\n` +
                                 `Para: ${chaveFormatada}`
                    };
                }
                
                // Se tiver 10-11 dígitos (DDD + número com/sem 9)
                if (apenasNumerosCel.length >= 10 && apenasNumerosCel.length <= 11) {
                    // Verificar se já tem código do país (55)
                    let numeroFinal = apenasNumerosCel;
                    
                    // Adicionar 55 se não tiver
                    if (!apenasNumerosCel.startsWith('55')) {
                        numeroFinal = '55' + apenasNumerosCel;
                    }
                    
                    // Verificar se tem 9 dígitos após DDD (formato correto: 55DDD9XXXXXXXX)
                    const ddd = numeroFinal.substring(2, 4);
                    const resto = numeroFinal.substring(4);
                    
                    // CORREÇÃO: Adicionar o dígito 9 se não tiver
                    if (resto.length === 8) {
                        numeroFinal = '55' + ddd + '9' + resto;
                    }
                    
                    const chaveFormatada = '+' + numeroFinal;
                    
                    return {
                        valido: true,
                        chaveFormatada: chaveFormatada,
                        mensagem: `✅ Celular válido!\n\n` +
                                 `Chave: ${chaveFormatada}`
                    };
                }
            }
            
            return {
                valido: false,
                chaveFormatada: '',
                mensagem: `❌ Celular inválido!\n\n` +
                         `Formato correto:\n` +
                         `• 86176915 (8 dígitos) → +5581986176915\n` +
                         `• 861769155 (9 dígitos com 9) → +5581986176915\n` +
                         `• 81986176915 (11 dígitos com DDD) → +5581986176915`
            };
            
        case 'cpf':
            // Validar CPF: 11 dígitos (com ou sem formatação)
            const cpfNumeros = chave.replace(/\D/g, '');
            
            if (cpfNumeros.length === 11) {
                // Formatar CPF: 123.456.789-09 (opcional)
                const cpfFormatado = cpfNumeros.replace(
                    /(\d{3})(\d{3})(\d{3})(\d{2})/,
                    '$1.$2.$3-$4'
                );
                
                // Salvar sem formatação (padrão PIX)

                };

                             `Exemplos:\n` +
                             `• 12345678909 (sem formatação)\n` +
                             `• 123.456.789-09 (com formatação)`
                };
            }
            
        case 'cnpj':
            // Validar CNPJ: 14 dígitos (com ou sem formatação)
            const cnpjNumeros = chave.replace(/\D/g, '');
            
            if (cnpjNumeros.length === 14) {
                // Formatar CNPJ: 12.345.678/0001-90 (opcional)
                const cnpjFormatado = cnpjNumeros.replace(
                    /(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,
                    '$1.$2.$3/$4-$5'
                );
                
                // CORREÇÃO: Salvar sem formatação (padrão PIX)
                return {
                    valido: true,
                    chaveFormatada: cnpjNumeros,
                    mensagem: `✅ CNPJ válido! (14 dígitos)\n\n` +
                             `Formatado: ${cnpjFormatado}\n` +
                             `Será salvo como: ${cnpjNumeros}`
                };
            } else {
                return {
                    valido: false,
                    chaveFormatada: '',
                    mensagem: `❌ CNPJ inválido!\n\n` +
                             `Deve ter exatamente 14 dígitos.\n` +
                             `Digitado: ${cnpjNumeros.length} dígitos\n\n` +
                             `Exemplos:\n` +
                             `• 12345678000195 (sem formatação)\n` +
                             `• 12.345.678/0001-95 (com formatação)`
                };
            }
            
        case 'email':
            // Validar email básico
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (emailRegex.test(chave.toLowerCase())) {
                return {

// 🔧 FUNÇÃO PARA DETECTAR TIPO DE CHAVE MELHORADO
function detectarTipoChaveAuto(chave) {
    chave = chave.trim().toLowerCase();
    
    // 1. Email (prioridade máxima)
    if (chave.includes('@')) {
        return 'email';
    }
    
    // 2. Remover todos não-numéricos para análise
    const apenasNumeros = chave.replace(/\D/g, '');
    
    // 3. CPF (11 dígitos) - CORREÇÃO: melhor detecção
    if (apenasNumeros.length === 11) {
        // Verificar se é CPF (primeiro dígito pode ser 0)
        // CPFs geralmente não começam com 8 ou 9 (reservados para celulares)
        const primeiroDigito = parseInt(apenasNumeros.charAt(0));
        
        // Se começar com 0-7, provavelmente é CPF
        if (primeiroDigito >= 0 && primeiroDigito <= 7) {
            return 'cpf';
        }
        
        // Se começar com 8 ou 9, provavelmente é celular
        if (primeiroDigito === 8 || primeiroDigito === 9) {
            return 'celular';
        }
        
        return 'cpf'; // padrão
    }
    
    // 4. CNPJ (14 dígitos)
    if (apenasNumeros.length === 14) {
        return 'cnpj';
    }
    
    // 5. Celular (8-11 dígitos) - CORREÇÃO: melhor detecção
    if (apenasNumeros.length >= 8 && apenasNumeros.length <= 11) {
        // Se começar com 8 ou 9, é celular
        const primeiroDigito = parseInt(apenasNumeros.charAt(0));
        if (primeiroDigito === 8 || primeiroDigito === 9) {
            return 'celular';
        }
        
        // Se tiver 10-11 dígitos e começar com DDD (2 dígitos)
        if (apenasNumeros.length >= 10) {
            const ddd = parseInt(apenasNumeros.substring(0, 2));
            // DDDs válidos no Brasil são entre 11 e 99
            if (ddd >= 11 && ddd <= 99) {
                const segundoDigito = parseInt(apenasNumeros.charAt(2));
                // Celulares atuais começam com 9 após o DDD
                if (segundoDigito === 9) {
                    return 'celular';
                }
                return 'telefone';
            }
        }
        
        return 'celular'; // padrão para números curtos
    }
    
    // 6. Celular com código do país (12-13 dígitos com +55)
    if (chave.startsWith('+55') || (apenasNumeros.length === 12 && apenasNumeros.startsWith('55'))) {
        return 'celular';
    }
    
    // 7. Chave aleatória (UUID-like)
    if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(chave)) {
        return 'chave_aleatoria';
    }
    
    // 8. Outras chaves aleatórias (com caracteres especiais)
    if (/[a-z]/i.test(chave) && /[0-9]/.test(chave)) {
        return 'chave_aleatoria';
    }
    
    // 9. Se tiver apenas números mas não se encaixa nos padrões acima
    if (/^\d+$/.test(chave) && chave.length >= 5 && chave.length <= 77) {
        return 'telefone';
    }
    
    // 10. Default
    return 'outro';
}

      });

document.getElementById('btnCopyPayload').addEventListener('click', async () => {
  try {
    const pixEl = document.getElementById('pixPayload');
    const pixText = pixEl.value;
    
    if (!pixText || pixText.includes('⚠️') || pixText.includes('Adicione produtos')) {
      alert('Não há código PIX válido para copiar!');
      return;
    }
    
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(pixText);
    } else {
      pixEl.select();
      pixEl.setSelectionRange(0, 99999);
      document.execCommand('copy');
    }
    
    const btn = document.getElementById('btnCopyPayload');
    const originalText = btn.textContent;
    btn.textContent = '✅ Copiado!';
    btn.style.background = '#27ae60';
    
    setTimeout(() => {
      btn.textContent = originalText;
      btn.style.background = '';
    }, 2000);
    
  } catch (error) {
    console.error('Erro ao copiar PIX:', error);
    alert('❌ Erro ao copiar código PIX. Tente selecionar e copiar manualmente.');
  }
});

document.getElementById('btnUseLocation')?.addEventListener('click', () => {
  if (!navigator.geolocation) {
    alert("Seu navegador não suporta geolocalização.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const link = `https://www.google.com/maps?q=${lat},${lng}`;
      document.getElementById('clientLocation').value = link;
      alert("Localização capturada com sucesso!");
    },
    (err) => {
      alert("Não foi possível obter a localização. Ative o GPS e tente novamente.");
    }
  );
});

// Modificar a inicialização para usar cache
document.addEventListener('DOMContentLoaded', async () => {
  try {
    console.log('🚀 Sistema inicializando (versão otimizada)...');
    
    // 1. PRIMEIRO: Autenticar e carregar configurações em paralelo
    await Promise.all([
      auth.signInAnonymously().catch(() => {
        console.log('⚠️ Autenticação em segundo plano');
      }),
      inicializarPix()
    ]);
    
    // 2. Carregar carrinho do localStorage APÓS autenticação
    const savedCart = localStorage.getItem('cart');
    if (savedCart) {
      try {
        cart = JSON.parse(savedCart);
        console.log('✅ Carrinho carregado do localStorage:', cart.length, 'itens');
      } catch (e) {
        console.error('❌ Erro ao carregar carrinho:', e);
        cart = [];
      }
    }
    
    // 3. Adicionar real-time listener para produtos (ATUALIZAÇÃO EM TEMPO REAL)
    db.collection('produtos').onSnapshot((snapshot) => {
      console.log('🔄 Atualização em tempo real de produtos detectada');
      
      // Invalidar cache quando houver mudanças
      produtosCache = null;
      ultimoCarregamentoCache = null;
      
      // Recarregar produtos se o catálogo estiver visível
      if (typeof carregarProdutos === 'function' && 
          document.getElementById('catalogCard').style.display !== 'none') {
        setTimeout(() => {
          carregarProdutos();
        }, 500);
      }
    });
    
    // 4. Configurar listener do status do carrinho
    db.collection("config").doc("cart").onSnapshot(() => {
      atualizarStatusCarrinhoUnificado();
    });
    
    // 5. Carregar status inicial do carrinho
    await atualizarStatusCarrinhoUnificado();
    
    // 6. Atualizar contador do carrinho IMEDIATAMENTE
    updateCartCount();
    
    // 7. Carregar produtos (usando versão otimizada)
    await carregarProdutosOtimizado();
    
    // 8. Adicionar evento de pesquisa
    document.getElementById('searchInput').addEventListener('input', () => {
      carregarProdutos();
    });
    
    // 9. Atualizar carrinho visual se houver itens
    if (cart.length > 0) {
      console.log('🔄 Renderizando carrinho com', cart.length, 'itens...');
      renderCart();
    }
    
    console.log('✅ Sistema inicializado com sucesso!');
    
  } catch (error) {
    console.error('❌ Erro na inicialização:', error);
    alert('Erro ao carregar o sistema. Recarregue a página.');
  }
});

window.reporEstoqueManual = async function() {
  try {
    console.log('🔍 Buscando produtos para reposição...');

    const querySnapshot = await db.collection('produtos').orderBy('name').get();

      produtos.push({
        id: doc.id,

        precoUnidade: dados.priceUnit || 0,
        precoKg: dados.priceKg || 0
      });
    });

    // Verificar se os números estão corretos
    produtos.forEach((prod, idx) => {
      console.log(`Produto ${idx + 1}: Número no array: ${prod.numero}, Nome: ${prod.nome}`);
    });
    
    // Criar modal HTML
    const modalHTML = `

          box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        ">
          <div style="
            background: linear-gradient(90deg, #16a085, #1abc9c);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
          ">

            </h3>
            <button id="closeModalBtn" style="
              background: #e74c3c;
              color: white;
              border: none;
              padding: 5px 10px;
              border-radius: 4px;
              cursor: pointer;
              font-weight: bold;
            ">
              X FECHAR
            </button>
          </div>
          
          <div style="padding: 15px; max-height: 60vh; overflow-y: auto;">
            <div style="
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
              gap: 10px;
              margin-bottom: 15px;
            " id="produtosGrid">
              ${produtos.map(prod => {
                // Calcular preço para mostrar
                let precoMostrar = 0;
                let tipoPreco = '';
                
                if (prod.precoUnidade > 0) {
                  precoMostrar = prod.precoUnidade;
                  tipoPreco = '(unidade)';
                } else if (prod.precoKg > 0) {
                  precoMostrar = prod.precoKg;
                  tipoPreco = '(kg)';
                }
                
                return `
                <div style="
                  border: 1px solid #ddd;
                  border-radius: 6px;
                  padding: 10px;
                  background: #f9f9f9;
                  cursor: pointer;
                  transition: all 0.2s;
                " 
                class="produto-item"
                data-numero="${prod.numero}"
                onclick="selecionarProdutoEstoqueModal(${prod.numero})">
                  <div style="font-weight: bold; color: #2c3e50; margin-bottom: 5px;">
                    [${prod.numero}] ${prod.nome}
                  </div>

                  </div>

            <div style="

              </div>
              <div style="display: flex; gap: 10px; justify-content: center;">
                <input type="number" 
                  id="numeroProdutoInput"
                  placeholder="Número (1-${produtos.length})"
                  min="1"
                  max="${produtos.length}"
                  style="

                  padding: 10px 20px;

                  font-weight: bold;

    if (window.selecionarProdutoEstoqueModal) {
      delete window.selecionarProdutoEstoqueModal;
    }
    
    // Adicionar modal ao corpo
    const modalContainer = document.createElement('div');
    modalContainer.innerHTML = modalHTML;
    document.body.appendChild(modalContainer);
    
    // Função para selecionar produto
    window.selecionarProdutoEstoqueModal = async function(numeroProduto) {
      console.log('🎯 Produto selecionado:', numeroProduto);
      
      const produto = produtos.find(p => p.numero === numeroProduto);
      
      if (!produto) {
        alert('❌ Produto não encontrado!');
        return;
      }
      
      // Remover modal
      const modal = document.getElementById('estoqueModal');
      if (modal) modal.remove();
      
      // Pedir nova quantidade
      const novaQtd = prompt(
        `📊 ATUALIZAR ESTOQUE\n\n` +
        `Produto: ${produto.nome}\n` +
        `Estoque atual: ${produto.estoque}\n\n` +
        `Digite a nova quantidade:`
      );
      
      if (novaQtd === null) {
        console.log('❌ Operação cancelada pelo usuário');
        return;
      }
      
      const quantidade = parseInt(novaQtd);
      
      if (isNaN(quantidade) || quantidade < 0) {
        alert('❌ Quantidade inválida! Digite um número válido (ex: 0, 10, 25).');
        return;
      }
      
      // Confirmar
      const diferenca = quantidade - produto.estoque;
      const confirmar = confirm(
        `⚠️ CONFIRMAR ATUALIZAÇÃO?\n\n` +
        `Produto: ${produto.nome}\n` +
        `Estoque atual: ${produto.estoque}\n` +
        `Novo estoque: ${quantidade}\n` +
        `Diferença: ${diferenca >= 0 ? '+' : ''}${diferenca} unidades`
      );
      
      if (!confirmar) {
        alert('❌ Atualização cancelada.');
        return;
      }
      
      // Mostrar loading
      const loadingMsg = `🔄 Atualizando ${produto.nome}...`;
      const loadingDiv = document.createElement('div');
      loadingDiv.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #2c3e50;
        color: white;
        padding: 20px 30px;
        border-radius: 10px;
        z-index: 10000;
        font-weight: bold;
      `;
      loadingDiv.textContent = loadingMsg;
      document.body.appendChild(loadingDiv);
      
      try {
        // Atualizar no Firebase
        await db.collection('produtos').doc(produto.id).update({
          stock: quantidade,
          atualizadoEm: new Date().toISOString()
        });
        
        // 📝 LOG DE ALTERAÇÃO DE ESTOQUE
        await sistemaLogs.registrar('estoque_alterado', {
          produtoId: produto.id,
          produtoNome: produto.nome,
          estoqueAnterior: produto.estoque,
          estoqueNovo: quantidade,
          diferenca: diferenca,
          adminId: auth.currentUser?.uid
        });
        
        // Remover loading
        loadingDiv.remove();
        
        // Mostrar sucesso
        alert(`✅ ESTOQUE ATUALIZADO!\n\n` +
              `📦 ${produto.nome}\n` +
              `🔄 ${produto.estoque} → ${quantidade}\n` +
              `📈 ${diferenca >= 0 ? '+' : ''}${diferenca} unidades`);
        
        // 🔥 INVALIDAR CACHE
        produtosCache = null;
        ultimoCarregamentoCache = null;
        
        // Recarregar produtos
        if (typeof carregarProdutos === 'function') {
          setTimeout(() => {
            carregarProdutos();
            console.log('🔄 Catálogo recarregado');
          }, 500);
        }
        
      } catch (error) {
        loadingDiv.remove();
        console.error('❌ Erro ao atualizar:', error);
        await sistemaLogs.registrar('estoque_erro', {
          erro: error.message,
          produtoId: produto.id,
          adminId: auth.currentUser?.uid
        });
        alert(`❌ Erro ao atualizar estoque:\n\n${error.message}`);
      }
    };
    
    // Configurar eventos
    document.getElementById('closeModalBtn').addEventListener('click', function() {
      const modal = document.getElementById('estoqueModal');
      if (modal) modal.remove();
    });
    
    document.getElementById('selecionarPorNumeroBtn').addEventListener('click', function() {
      const input = document.getElementById('numeroProdutoInput');
      const numero = parseInt(input.value);
      
      if (isNaN(numero) || numero < 1 || numero > produtos.length) {
        alert(`❌ Número inválido!\n\nDigite um número entre 1 e ${produtos.length}`);
        return;
      }
      
      window.selecionarProdutoEstoqueModal(numero);
    });
    
    document.getElementById('numeroProdutoInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('selecionarPorNumeroBtn').click();
      }
    });
    
    // Fechar modal ao clicar fora
    document.getElementById('estoqueModal').addEventListener('click', function(e) {
      if (e.target.id === 'estoqueModal') {
        this.remove();
      }
    });
    
    // Adicionar efeito hover aos cards
    setTimeout(() => {
      const cards = document.querySelectorAll('.produto-item');
      cards.forEach(card => {
        card.addEventListener('mouseenter', function() {
          this.style.transform = 'translateY(-2px)';
          this.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)';
          this.style.borderColor = '#3498db';
        });
        
        card.addEventListener('mouseleave', function() {
          this.style.transform = 'translateY(0)';
          this.style.boxShadow = 'none';
          this.style.borderColor = '#ddd';
        });
      });
    }, 100);
    
  } catch (error) {
    console.error('❌ Erro na função reporEstoqueManual:', error);
    alert('❌ Erro ao carregar produtos: ' + error.message);
  }
};

window.corrigirPixNoFirebase = async function() {

    if (pixSnap.exists) {

      // Se já tem chave mas não tem nome, adiciona

        );
        
        const cidade = prompt(

        );
        
        if (nome && cidade) {
          await db.collection('config').doc('pix').update({
            nomeTitular: nome.trim(),

          });
          
          alert('✅ PIX corrigido no Firebase!\n\nNome: ' + nome + '\nCidade: ' + cidade);
          
          // Recarregar página para aplicar
          location.reload();
        }
      } else {

    }
  } catch (error) {
    console.error('Erro:', error);
    alert('❌ Erro: ' + error.message);
  }
};

window.ativarModoTecnico = async function() {
    console.log('🔧 Solicitando acesso ao modo técnico...');
    
    // Função para criar modal de senha
    function criarModalSenhaTecnico() {
        return new Promise((resolve) => {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.8);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 999999;
                font-family: Arial, sans-serif;
            `;
            
            modal.innerHTML = `
                <div style="background: #2c3e50; color: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <h3 style="color: #f39c12; margin-top: 0; text-align: center;">🔧 ACESSO MODO TÉCNICO</h3>
                    
                    <p style="text-align: center; color: #bdc3c7; margin-bottom: 20px;">
                        Digite a senha do modo técnico (senha exclusiva):
                    </p>
                    
                    <input type="password" 
                           id="senhaModoTecnico" 
                           placeholder="Digite a senha do técnico"
                           style="
                               width: 100%;
                               padding: 12px;
                               border-radius: 6px;
                               border: 2px solid #f39c12;
                               background: #34495e;
                               color: white;
                               font-size: 16px;
                               margin-bottom: 20px;
                               box-sizing: border-box;
                           "
                           autofocus>
                    
                    <div style="display: flex; gap: 10px;">
                        <button id="btnCancelarTecnico"
                                style="
                                    background: #7f8c8d;
                                    color: white;
                                    border: none;
                                    padding: 12px;
                                    border-radius: 6px;
                                    cursor: pointer;
                                    flex: 1;
                                    font-weight: bold;
                                ">
                            ❌ Cancelar
                        </button>
                        
                        <button id="btnConfirmarTecnico"
                                style="
                                    background: #2ecc71;
                                    color: white;
                                    border: none;
                                    padding: 12px;
                                    border-radius: 6px;
                                    cursor: pointer;
                                    flex: 1;
                                    font-weight: bold;
                                ">
                            ✅ Acessar
                        </button>
                    </div>
                    
                    <div style="margin-top: 15px; font-size: 12px; color: #95a5a6; text-align: center;">
                        Senha exclusiva para acesso técnico (diferente do admin)
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            const senhaInput = document.getElementById('senhaModoTecnico');
            const btnConfirmar = document.getElementById('btnConfirmarTecnico');
            const btnCancelar = document.getElementById('btnCancelarTecnico');
            
            senhaInput.focus();
            
            const removerModal = () => {
                if (document.body.contains(modal)) {
                    document.body.removeChild(modal);
                }
            };
            
            btnConfirmar.onclick = async () => {
                const senha = senhaInput.value;
                if (!senha) {
                    alert('❌ Digite a senha do técnico!');
                    return;
                }
                
                // Verificar senha DO TÉCNICO (exclusiva)
                const senhaHash = await hashSenha(senha);
                const senhaValida = await verificarSenhaTecnico(senhaHash); // <-- MUDANÇA AQUI
                
                if (!senhaValida) {
                    // Log de tentativa falha
                    await sistemaLogs.registrar('acesso_tecnico_falha', {
                        motivo: 'senha_incorreta',
                        ip: await getUserIP()
                    });
                    
                    alert('❌ Senha do modo técnico incorreta!');
                    return;
                }
                
                removerModal();
                
                // Log de acesso bem-sucedido
                await sistemaLogs.registrar('acesso_tecnico_sucesso', {
                    usuario: auth.currentUser?.uid,
                    ip: await getUserIP()
                });
                
                resolve(true); // Acesso permitido
            };
            
            btnCancelar.onclick = () => {
                removerModal();
                resolve(false); // Acesso cancelado
            };
            
            // Enter para confirmar
            senhaInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    btnConfirmar.click();
                }
            });
            
            // ESC para cancelar
            modal.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    btnCancelar.click();
                }
            });
        });
    }
    
    // Solicitar senha do técnico (não do admin)
    const acessoPermitido = await criarModalSenhaTecnico();
    
    if (acessoPermitido) {
        console.log('✅ Acesso ao modo técnico autorizado!');
        adminAutenticado = true; // Permite acesso às funções protegidas
        criarPainelTecnico();
    } else {
        console.log('❌ Acesso ao modo técnico negado ou cancelado.');
    }
};
